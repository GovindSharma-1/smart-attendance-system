<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shatranj</title>

<style>
    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #e9e6e6;
        font-family: Arial, sans-serif;
    }

    .chess-container {
        text-align: center;
        color: brown;
    }

    .board {
        display: grid;
        grid-template-columns: repeat(8, 70px);
        grid-template-rows: repeat(8, 70px);
        border: 4px solid #0f0101;
        margin: 10px auto;
    }

    .square {
        width: 70px;
        height: 70px;
        display: flex;
        justify-content: center;
        align-items: center;
        font-size: 40px;
        cursor: pointer;
        user-select: none;
    }

    .white { background-color: #f4f3f0; }
    .black { background-color: #100904; }

    .selected {
        outline: 4px solid red;
    }

    .timers {
        display: flex;
        justify-content: space-between;
        margin-bottom: 10px;
        font-size: 18px;
    }
</style>
</head>

<body>

<div class="chess-container">
    <h1>Shatranj</h1>

    <div class="timers">
        <div>White: <span id="whiteTimer">10:00</span></div>
        <div>Black: <span id="blackTimer">10:00</span></div>
    </div>

    <div class="board" id="board"></div>
</div>

<script>
const boardElement = document.getElementById("board");

const pieces = {
    r: "♜", n: "♞", b: "♝", q: "♛", k: "♚", p: "♟",
    R: "♖", N: "♘", B: "♗", Q: "♕", K: "♔", P: "♙"
};

let board = [
    "rnbqkbnr",
    "pppppppp",
    "........",
    "........",
    "........",
    "........",
    "PPPPPPPP",
    "RNBQKBNR"
];

let selectedSquare = null;
let currentPlayer = "white";

/* ---------------- TIMER ---------------- */
let whiteTime = 600;
let blackTime = 600;
let timerInterval = setInterval(updateTimer, 1000);

function updateTimer() {
    if (currentPlayer === "white") whiteTime--;
    else blackTime--;

    document.getElementById("whiteTimer").textContent = formatTime(whiteTime);
    document.getElementById("blackTimer").textContent = formatTime(blackTime);

    if (whiteTime <= 0 || blackTime <= 0) {
        clearInterval(timerInterval);
        alert("Time over! Game finished.");
    }
}

function formatTime(seconds) {
    let m = Math.floor(seconds / 60);
    let s = seconds % 60;
    return `${m}:${s.toString().padStart(2, "0")}`;
}

/* ---------------- DRAW BOARD ---------------- */
function drawBoard() {
    boardElement.innerHTML = "";

    for (let row = 0; row < 8; row++) {
        for (let col = 0; col < 8; col++) {
            const square = document.createElement("div");
            square.classList.add("square");

            const isWhite = (row + col) % 2 === 0;
            square.classList.add(isWhite ? "white" : "black");

            const piece = board[row][col];
            if (piece !== ".") square.textContent = pieces[piece];

            square.dataset.row = row;
            square.dataset.col = col;
            square.addEventListener("click", () => handleClick(square));

            boardElement.appendChild(square);
        }
    }
}

/* ---------------- CLICK HANDLER ---------------- */
function handleClick(square) {
    const row = parseInt(square.dataset.row);
    const col = parseInt(square.dataset.col);
    const piece = board[row][col];

    if (selectedSquare) {
        if (isLegalMove(selectedSquare, { row, col })) {
            movePiece(selectedSquare, { row, col });
            currentPlayer = currentPlayer === "white" ? "black" : "white";
        }
        selectedSquare = null;
        drawBoard();
    } else {
        if (piece !== "." && isCurrentPlayerPiece(piece)) {
            selectedSquare = { row, col };
            square.classList.add("selected");
        }
    }
}

/* ---------------- RULES ---------------- */
function isCurrentPlayerPiece(piece) {
    return currentPlayer === "white" ? piece === piece.toUpperCase() : piece === piece.toLowerCase();
}

function isLegalMove(from, to) {
    const piece = board[from.row][from.col];
    const target = board[to.row][to.col];

    if (target !== "." && isCurrentPlayerPiece(target)) return false;

    const dr = to.row - from.row;
    const dc = to.col - from.col;

    switch (piece.toLowerCase()) {
        case "p":
            let dir = piece === "P" ? -1 : 1;
            return dc === 0 && dr === dir && target === ".";
        case "r":
            return dr === 0 || dc === 0;
        case "b":
            return Math.abs(dr) === Math.abs(dc);
        case "n":
            return (Math.abs(dr) === 2 && Math.abs(dc) === 1) ||
                   (Math.abs(dr) === 1 && Math.abs(dc) === 2);
        case "q":
            return dr === 0 || dc === 0 || Math.abs(dr) === Math.abs(dc);
        case "k":
            return Math.abs(dr) <= 1 && Math.abs(dc) <= 1;
    }
    return false;
}

/* ---------------- MOVE PIECE ---------------- */
function movePiece(from, to) {
    let boardArray = board.map(r => r.split(""));
    boardArray[to.row][to.col] = boardArray[from.row][from.col];
    boardArray[from.row][from.col] = ".";
    board = boardArray.map(r => r.join(""));
}

drawBoard();
</script>

</body>
</html>
